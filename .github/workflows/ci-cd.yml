name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  APP_VERSION: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────
  #  LINT
  # ─────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 app/ --max-line-length=500 --ignore=E501,W503,W504,E302,E303,W292

  # ─────────────────────────────────────────────
  #  TEST
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  #  SECURITY — dependency vulnerability scan
  # ─────────────────────────────────────────────
  dependency-scan:
    name: Security - Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --desc
        continue-on-error: true   # report but don't block the demo pipeline

  # ─────────────────────────────────────────────
  #  SECURITY — secrets scan
  # ─────────────────────────────────────────────
  secrets-scan:
    name: Security - Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  #  SECURITY — container image scan
  # ─────────────────────────────────────────────
  image-scan:
    name: Security - Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t devops-app:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-app:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'   # report but don't block the demo pipeline

  # ─────────────────────────────────────────────
  #  DEPLOY (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production (Blue-Green)
    runs-on: ubuntu-latest
    needs: [test, dependency-scan, secrets-scan, image-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Start app (Blue slot)
        run: |
          APP_ENV=production APP_VERSION=${{ github.sha }} PORT=5001 python3 app/app.py &
          sleep 3

      - name: Health check
        run: |
          curl -f http://localhost:5001/health
          echo "✅ Health check passed"

      - name: Post-deploy smoke test
        run: |
          curl -f http://localhost:5001/metrics | head -5
          curl -f -X POST http://localhost:5001/api/messages \
            -H "Content-Type: application/json" \
            -d '{"author":"ci","body":"smoke test"}'
          echo "✅ Smoke test passed"

      - name: Simulate traffic switch (Green slot)
        run: |
          echo "🔀 Switching traffic to green slot"
          echo "✅ Blue-Green deploy complete for version ${{ github.sha }}"
